name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        julia-version:
          - "1.10"
          - "1.11"
          - "1.12"

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}

      - uses: julia-actions/cache@v3

      - name: Develop unregistered deps and run tests
        run: >
          julia --project=. -e '
          using Pkg;
          Pkg.develop([
            PackageSpec(url="https://github.com/JuliaKnowledge/AzureIdentity.jl"),
            PackageSpec(url="https://github.com/JuliaKnowledge/Mem0.jl"),
            PackageSpec(url="https://github.com/JuliaKnowledge/AgentFramework.jl"),
          ]);
          Pkg.instantiate();
          Pkg.test()'
