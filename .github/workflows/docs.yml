name: Documentation

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  statuses: write

jobs:
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.10'
      - uses: julia-actions/cache@v3
      - name: Install dependencies
        run: >
          julia --project=docs -e '
          using Pkg;
          Pkg.develop([
            PackageSpec(url="https://github.com/JuliaKnowledge/AzureIdentity.jl"),
            PackageSpec(url="https://github.com/JuliaKnowledge/Mem0.jl"),
            PackageSpec(url="https://github.com/JuliaKnowledge/AgentFramework.jl"),
            PackageSpec(path=pwd()),
          ]);
          Pkg.instantiate()'
      - name: Build and deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: julia --project=docs docs/make.jl
